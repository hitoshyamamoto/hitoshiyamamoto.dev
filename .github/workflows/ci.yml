name: ci

# Verificação em Pull Requests para a main: type-check + build, sem deploy.
# Pega erros antes do merge; o deploy.yml é quem publica, já na main.
#
# Actions fixadas por SHA (com o comentário da versão); Node vem do .nvmrc.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
