name: deploy

# Build + deploy para GitHub Pages.
# Roda em todo push na main (inclusive ao escrever um post) e após o refresh
# de dados, que também commita na main.
#
# Actions fixadas por SHA (com o comentário da versão) para hardening da cadeia
# de suprimentos; a versão do Node vem do .nvmrc, fonte única.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Permite um único deploy concorrente; não cancela um em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build (com gate de type-check antes) ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
