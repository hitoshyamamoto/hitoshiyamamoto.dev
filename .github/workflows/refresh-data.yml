name: refresh-data

# Pipeline desacoplado: roda os fetchers no cron, atualiza os JSON em src/data/
# e commita. Esse commit dispara o deploy.
#
# Actions fixadas por SHA (com o comentário da versão); Node vem do .nvmrc.

on:
  schedule:
    - cron: '0 */6 * * *' # a cada 6 horas
  workflow_dispatch: {} # permite rodar manualmente

permissions:
  contents: write # para commitar os artefatos atualizados

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Fetch Medium (append-only)
        run: npm run fetch:medium
        env:
          MEDIUM_USER: hitoshyamamoto

      - name: Fetch GitHub (curados)
        run: npm run fetch:github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: hitoshyamamoto

      - name: Commit artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/data)" ]]; then
            git add src/data
            git commit -m "chore(data): refresh medium/github artifacts"
            git push
          else
            echo "Sem mudanças nos artefatos. Nada a commitar."
          fi
